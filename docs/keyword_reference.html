<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Keyword Reference — Purplle Robot Framework Suite</title>
<style>
  :root {
    --bg:#0d0a14;--surface:#15101f;--surface2:#1e1630;--border:#2d2248;
    --purple:#9b5de5;--pink:#f72585;--blue:#4361ee;--green:#06d6a0;
    --cyan:#00b4d8;--orange:#fb8500;--teal:#4cc9f0;--text:#e8e0f5;
    --muted:#8b7aa8;--code-bg:#0a0714;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden}

  /* ── Sidebar ── */
  #sidebar{position:fixed;top:0;left:0;width:270px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow:hidden;transition:transform .3s}
  #sidebar-header{padding:22px 20px 14px;background:linear-gradient(135deg,#1a0a2e,#0d0a14);border-bottom:1px solid var(--border);flex-shrink:0}
  #sidebar-header h2{font-size:12px;color:var(--purple);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
  #sidebar-header p{font-size:11px;color:var(--muted)}
  #search-box{margin:12px 14px 8px;display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex-shrink:0}
  #search-box svg{flex-shrink:0;opacity:.5}
  #search-input{background:none;border:none;outline:none;color:var(--text);font-size:12.5px;width:100%}
  #search-input::placeholder{color:var(--muted)}
  #nav{overflow-y:auto;flex:1;padding:6px 0 24px}
  #nav::-webkit-scrollbar{width:3px}
  #nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .nav-section{margin-bottom:2px}
  .nav-section-header{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:color .2s;user-select:none}
  .nav-section-header:hover{color:var(--text)}
  .nav-section-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .nav-section-header .chevron{margin-left:auto;transition:transform .25s}
  .nav-section-header.collapsed .chevron{transform:rotate(-90deg)}
  .nav-keywords{overflow:hidden;transition:max-height .3s ease}
  .nav-keyword{display:block;padding:6px 18px 6px 36px;font-size:12px;color:var(--muted);text-decoration:none;border-left:2px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nav-keyword:hover{color:var(--text);background:var(--surface2)}
  .nav-keyword.active{color:var(--text);border-left-color:var(--purple);background:rgba(155,93,229,.08)}
  .stats-bar{flex-shrink:0;padding:12px 18px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:10px;flex-wrap:wrap}
  .stat{text-align:center;flex:1}
  .stat-num{font-size:15px;font-weight:700;color:var(--purple)}
  .stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  /* ── Main ── */
  #main{margin-left:270px;flex:1;min-height:100vh}
  #topbar{position:sticky;top:0;z-index:50;background:rgba(13,10,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;gap:14px}
  #topbar h1{font-size:14px;font-weight:700;background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
  .filter-chips{display:flex;gap:7px;margin-left:auto;flex-wrap:wrap}
  .chip{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid transparent;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
  .chip[data-lib="all"]{border-color:var(--purple);color:var(--purple)}
  .chip[data-lib="all"].active{background:var(--purple);color:#fff}
  .chip[data-lib="selenium"]{border-color:var(--blue);color:var(--blue)}
  .chip[data-lib="selenium"].active{background:var(--blue);color:#fff}
  .chip[data-lib="requests"]{border-color:var(--green);color:var(--green)}
  .chip[data-lib="requests"].active{background:var(--green);color:#000}
  .chip[data-lib="collections"]{border-color:var(--cyan);color:var(--cyan)}
  .chip[data-lib="collections"].active{background:var(--cyan);color:#000}
  .chip[data-lib="builtin"]{border-color:var(--orange);color:var(--orange)}
  .chip[data-lib="builtin"].active{background:var(--orange);color:#000}
  .chip[data-lib="custom"]{border-color:var(--pink);color:var(--pink)}
  .chip[data-lib="custom"].active{background:var(--pink);color:#fff}
  .chip[data-lib="string"]{border-color:var(--teal);color:var(--teal)}
  .chip[data-lib="string"].active{background:var(--teal);color:#000}

  #content{padding:28px}
  #no-results{display:none;text-align:center;padding:80px 32px;color:var(--muted)}
  #no-results p{font-size:15px;margin-top:14px}

  /* ── Section Header ── */
  .section-block{margin-bottom:44px}
  .section-header{display:flex;align-items:center;gap:16px;padding:18px 24px;border-radius:14px;margin-bottom:22px;position:relative;overflow:hidden}
  .section-header[data-lib="selenium"]{background:rgba(67,97,238,.13);border:1px solid rgba(67,97,238,.3)}
  .section-header[data-lib="requests"]{background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.25)}
  .section-header[data-lib="collections"]{background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.25)}
  .section-header[data-lib="builtin"]{background:rgba(251,133,0,.1);border:1px solid rgba(251,133,0,.25)}
  .section-header[data-lib="custom"]{background:rgba(247,37,133,.1);border:1px solid rgba(247,37,133,.25)}
  .section-header[data-lib="string"]{background:rgba(76,201,240,.1);border:1px solid rgba(76,201,240,.25)}
  .section-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .section-icon[data-lib="selenium"]{background:rgba(67,97,238,.25);color:var(--blue)}
  .section-icon[data-lib="requests"]{background:rgba(6,214,160,.2);color:var(--green)}
  .section-icon[data-lib="collections"]{background:rgba(0,180,216,.2);color:var(--cyan)}
  .section-icon[data-lib="builtin"]{background:rgba(251,133,0,.2);color:var(--orange)}
  .section-icon[data-lib="custom"]{background:rgba(247,37,133,.2);color:var(--pink)}
  .section-icon[data-lib="string"]{background:rgba(76,201,240,.2);color:var(--teal)}
  .section-meta h2{font-size:18px;font-weight:700;margin-bottom:3px}
  .section-meta p{font-size:12px;color:var(--muted);font-family:monospace}
  .section-badge{margin-left:auto;padding:4px 13px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
  .section-badge[data-lib="selenium"]{background:rgba(67,97,238,.2);color:var(--blue)}
  .section-badge[data-lib="requests"]{background:rgba(6,214,160,.2);color:var(--green)}
  .section-badge[data-lib="collections"]{background:rgba(0,180,216,.2);color:var(--cyan)}
  .section-badge[data-lib="builtin"]{background:rgba(251,133,0,.2);color:var(--orange)}
  .section-badge[data-lib="custom"]{background:rgba(247,37,133,.2);color:var(--pink)}
  .section-badge[data-lib="string"]{background:rgba(76,201,240,.2);color:var(--teal)}

  /* ── Category label ── */
  .category-label{display:flex;align-items:center;gap:10px;margin:22px 0 12px;padding-left:2px}
  .category-label span{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
  .category-label::after{content:'';flex:1;height:1px;background:var(--border)}

  /* ── Keyword Card ── */
  .keyword-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:fadeup .3s ease both}
  @keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .keyword-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.3)}
  .keyword-card[data-lib="selenium"]:hover{border-color:var(--blue)}
  .keyword-card[data-lib="requests"]:hover{border-color:var(--green)}
  .keyword-card[data-lib="collections"]:hover{border-color:var(--cyan)}
  .keyword-card[data-lib="builtin"]:hover{border-color:var(--orange)}
  .keyword-card[data-lib="custom"]:hover{border-color:var(--pink)}
  .keyword-card[data-lib="string"]:hover{border-color:var(--teal)}
  .keyword-card.hidden{display:none}
  .kw-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
  .kw-badge{padding:2px 10px;border-radius:20px;font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
  .kw-badge[data-lib="selenium"]{background:rgba(67,97,238,.2);color:var(--blue)}
  .kw-badge[data-lib="requests"]{background:rgba(6,214,160,.18);color:var(--green)}
  .kw-badge[data-lib="collections"]{background:rgba(0,180,216,.18);color:var(--cyan)}
  .kw-badge[data-lib="builtin"]{background:rgba(251,133,0,.18);color:var(--orange)}
  .kw-badge[data-lib="custom"]{background:rgba(247,37,133,.18);color:var(--pink)}
  .kw-badge[data-lib="string"]{background:rgba(76,201,240,.18);color:var(--teal)}
  .kw-name{font-size:13.5px;font-weight:700;font-family:'Courier New',monospace;flex:1.2;min-width:0}
  .kw-purpose-preview{font-size:12px;color:var(--muted);flex:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .kw-toggle{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);flex-shrink:0;transition:transform .25s,background .2s}
  .kw-header.open .kw-toggle{transform:rotate(180deg);background:var(--purple)}
  .kw-body{display:none;border-top:1px solid var(--border)}
  .kw-body.open{display:block}
  .kw-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .kw-field{padding:14px 18px;border-bottom:1px solid var(--border)}
  .kw-field:nth-child(odd){border-right:1px solid var(--border)}
  .kw-field.full{grid-column:1/-1}
  .kw-field-label{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
  .label-purpose{color:var(--green)}
  .label-syntax{color:var(--cyan)}
  .label-notes{color:var(--orange)}
  .label-usage{color:var(--purple)}
  .label-source{color:var(--muted)}
  .kw-field-value{font-size:12.5px;line-height:1.6;color:var(--text)}
  code,.code-block{font-family:'Courier New',monospace;font-size:11.5px;background:var(--code-bg);border:1px solid var(--border);border-radius:5px;padding:2px 6px;color:var(--cyan)}
  .code-block{display:block;padding:11px 14px;margin:4px 0;white-space:pre;overflow-x:auto;line-height:1.75;color:var(--text);position:relative}
  .code-line{display:block}
  .copy-btn{position:absolute;top:7px;right:8px;padding:2px 9px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:9.5px;cursor:pointer;transition:all .2s}
  .copy-btn:hover{color:var(--text);border-color:var(--purple)}
  .copy-btn.copied{color:var(--green);border-color:var(--green)}
  .notes-text{font-size:12px;color:var(--muted);line-height:1.65;font-style:italic}
  .warn-text{font-size:12px;color:#fb8500;line-height:1.65}
  .status-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .status-badge{padding:2px 9px;border-radius:4px;font-size:10.5px;font-weight:600;font-family:monospace}
  .s-2xx{background:rgba(6,214,160,.15);color:var(--green)}
  .s-3xx{background:rgba(0,180,216,.15);color:var(--cyan)}
  .s-4xx{background:rgba(251,133,0,.15);color:var(--orange)}
  .s-5xx{background:rgba(247,37,133,.15);color:var(--pink)}

  /* ── Status table ── */
  .status-table-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:44px}
  .status-table-section h3{font-size:15px;font-weight:700;margin-bottom:4px;background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .status-table-section p{font-size:12px;color:var(--muted);margin-bottom:18px}
  .method-rows{display:flex;flex-direction:column;gap:10px}
  .method-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:9px;background:var(--surface2)}
  .method-pill{padding:4px 14px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;min-width:66px;text-align:center}
  .m-get{background:rgba(6,214,160,.2);color:var(--green)}
  .m-post{background:rgba(155,93,229,.2);color:var(--purple)}
  .m-put{background:rgba(0,180,216,.2);color:var(--cyan)}
  .m-patch{background:rgba(251,133,0,.2);color:var(--orange)}
  .m-delete{background:rgba(247,37,133,.2);color:var(--pink)}
  .m-head{background:rgba(76,201,240,.2);color:var(--teal)}
  .method-codes{display:flex;gap:5px;flex:1;flex-wrap:wrap}
  .method-note{font-size:10.5px;color:var(--muted);margin-left:auto;white-space:nowrap}
  .warning-box{background:rgba(247,37,133,.07);border:1px solid rgba(247,37,133,.22);border-radius:9px;padding:13px 16px;margin-top:14px;display:flex;align-items:flex-start;gap:11px}
  .warning-box p{font-size:12px;color:var(--text);line-height:1.6}
  .warning-box strong{color:var(--pink)}

  /* ── Mobile ── */
  #ham{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px;cursor:pointer;color:var(--text)}
  @media(max-width:800px){
    #sidebar{transform:translateX(-100%)}
    #sidebar.open{transform:translateX(0)}
    #main{margin-left:0}
    #ham{display:flex}
    .kw-grid{grid-template-columns:1fr}
    .kw-field:nth-child(odd){border-right:none}
    .filter-chips{display:none}
    .kw-purpose-preview{display:none}
  }
</style>
</head>
<body>

<button id="ham" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Menu">
  <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"><line x1="0" y1="4" x2="17" y2="4"/><line x1="0" y1="8.5" x2="17" y2="8.5"/><line x1="0" y1="13" x2="17" y2="13"/></svg>
</button>

<aside id="sidebar">
  <div id="sidebar-header">
    <h2>Keyword Reference</h2>
    <p>Purplle.com Robot Framework Suite</p>
  </div>
  <div id="search-box">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="text" placeholder="Search keywords…" autocomplete="off" />
  </div>
  <nav id="nav"></nav>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num">6</div><div class="stat-lbl">Libraries</div></div>
    <div class="stat"><div class="stat-num" id="kw-count">—</div><div class="stat-lbl">Keywords</div></div>
    <div class="stat"><div class="stat-num">100+</div><div class="stat-lbl">Examples</div></div>
  </div>
</aside>

<main id="main">
  <div id="topbar">
    <h1>Purplle RF Keyword Reference</h1>
    <div class="filter-chips">
      <button class="chip active" data-lib="all">All</button>
      <button class="chip" data-lib="selenium">Selenium</button>
      <button class="chip" data-lib="requests">Requests</button>
      <button class="chip" data-lib="collections">Collections</button>
      <button class="chip" data-lib="builtin">BuiltIn</button>
      <button class="chip" data-lib="string">String</button>
      <button class="chip" data-lib="custom">Custom</button>
    </div>
  </div>

  <div id="content">
    <div id="no-results">
      <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>No keywords match your search.</p>
    </div>
  </div>
</main>

<script>
const SECTIONS = [
/* ══════════════════════════════════════════════════════════════
   1. SELENIUM LIBRARY
══════════════════════════════════════════════════════════════ */
{
  id:'selenium',lib:'selenium',num:1,
  title:'SeleniumLibrary',
  import:'Library    SeleniumLibrary',
  used:'resources/common_resources.robot, resources/pages/*.robot, tests/functional/*, tests/integration/*, tests/e2e/*',
  icon:'🌐',
  categories:[
    {label:'Browser Lifecycle',keywords:[
      {name:'Open Browser',
       purpose:'Launch a new browser window and navigate to a URL.',
       syntax:'Open Browser    <url>    <browser>    [options=<opts>]',
       usage:['Open Browser    https://www.purplle.com    chrome','Open Browser    ${BASE_URL}    ${BROWSER}','Open Browser    ${url}    ${BROWSER}','...    options=add_argument("--headless=new");add_argument("--no-sandbox")'],
       notes:'${BROWSER} defaults to chrome. Pass options= for headless/flags. Called inside custom keyword Open Application in common_resources.'},
      {name:'Maximize Browser Window',
       purpose:'Maximize the browser window to full screen.',
       syntax:'Maximize Browser Window',
       usage:['Maximize Browser Window'],
       notes:'Called right after Open Browser inside Open Application.'},
      {name:'Close All Browsers',
       purpose:'Close every open browser session managed by SeleniumLibrary.',
       syntax:'Close All Browsers',
       usage:['Close All Browsers'],
       notes:'Used inside custom keyword Close Application for Suite Teardown.'},
      {name:'Switch Window',
       purpose:'Switch the active browser context to another open window or tab.',
       syntax:'Switch Window    <locator>',
       usage:['Switch Window    NEW','Switch Window    MAIN','Switch Window    title=Purplle | Best Beauty'],
       notes:'Use NEW to switch to a newly opened popup/tab. Use MAIN to return to the original. locator can be a window title, url, or index.'},
      {name:'Close Window',
       purpose:'Close the current browser window/tab and return to the previous one.',
       syntax:'Close Window',
       usage:['Close Window'],
       notes:'Does not close the entire browser. Use Close All Browsers in Suite Teardown.'},
      {name:'Get Window Handles',
       purpose:'Return a list of all open window handles.',
       syntax:'${handles}=    Get Window Handles',
       usage:['${handles}=    Get Window Handles','${count}=    Get Length    ${handles}','Should Be Equal As Integers    ${count}    2'],
       notes:'Useful for verifying a new tab opened. Combine with Switch Window to control it.'},
      {name:'Set Window Size',
       purpose:'Set the browser window to a specific width and height in pixels.',
       syntax:'Set Window Size    <width>    <height>',
       usage:['Set Window Size    1920    1080','Set Window Size    1280    800','Set Window Size    375    812    # Mobile viewport'],
       notes:'Useful for responsive testing at specific breakpoints.'},
    ]},
    {label:'Navigation',keywords:[
      {name:'Go To',
       purpose:'Navigate the current browser to a given URL.',
       syntax:'Go To    <url>',
       usage:['Go To    ${BASE_URL}','Go To    ${BASE_URL}/search?q=${keyword}','Go To    https://www.purplle.com/cart','Go To    https://www.purplle.com/makeup','Go To    https://www.purplle.com/profile/myfavourites','Go To    ${MAKEUP_URL}'],
       notes:'Used heavily in Test Setup and inside page keywords. Purplle is Angular — search requires direct URL navigation; pressing ENTER on the search bar does NOT trigger navigation.'},
      {name:'Go Back',
       purpose:'Navigate to the previous page in the browser history (equivalent to clicking Back).',
       syntax:'Go Back',
       usage:['Go Back','# Navigate to PDP then back to PLP','Click First Product','Go Back','Verify Products Are Listed'],
       notes:'Use to simulate a user pressing the browser back button. Verify the page loaded correctly after going back.'},
      {name:'Reload Page',
       purpose:'Reload/refresh the current page.',
       syntax:'Reload Page',
       usage:['Reload Page','Wait Until Element Is Visible    ${LOGO}'],
       notes:'Use when testing that state persists after a page refresh (e.g. cart items remain).'},
      {name:'Get Location',
       purpose:'Return the current browser URL as a string.',
       syntax:'${url}=    Get Location',
       usage:['${url}=    Get Location','Should Contain    ${url}    /search','Log    Current URL: ${url}'],
       notes:'Alias: Get Current Url. Use instead of Location Should Be when you need the URL as a variable.'},
      {name:'Location Should Be',
       purpose:'Assert the current URL matches exactly.',
       syntax:'Location Should Be    <expected_url>',
       usage:['Location Should Be    https://www.purplle.com/'],
       notes:'Use for exact URL match. Use Location Should Contain for partial.'},
      {name:'Location Should Contain',
       purpose:'Assert the current URL contains a substring.',
       syntax:'Location Should Contain    <substring>',
       usage:['Location Should Contain    myfavourites','Location Should Contain    /search?q='],
       notes:'Preferred over Location Should Be when query strings may vary.'},
    ]},
    {label:'Waits',keywords:[
      {name:'Wait Until Element Is Visible',
       purpose:'Pause test execution until an element becomes visible on the page. Fails if the element is not visible within the timeout.',
       syntax:'Wait Until Element Is Visible    <locator>    timeout=<time>',
       usage:['Wait Until Element Is Visible    ${LOGO}','Wait Until Element Is Visible    ${FIRST_PRODUCT_CARD}    timeout=15s','Wait Until Element Is Visible    ${EMPTY_CART_MESSAGE}    timeout=15s','Wait Until Element Is Visible    ${MOBILE_INPUT}    timeout=10s','Wait Until Element Is Visible    ${SEARCH_SUGGESTION_BOX}    timeout=5s','Wait Until Element Is Visible    xpath=//h1    timeout=15s'],
       notes:'ALWAYS use this instead of Sleep. Default timeout is ${TIMEOUT} (15s). Never use Sleep — it is fragile and wastes time.'},
      {name:'Wait Until Element Is Not Visible',
       purpose:'Wait until an element disappears from the visible viewport. Fails if still visible after timeout.',

// ── Build UI ──────────────────────────────────────────────────────────────────
const content = document.getElementById('content');
const nav     = document.getElementById('nav');
let totalKw   = 0;
const libColor = {
  selenium:'var(--blue)',requests:'var(--green)',
  collections:'var(--cyan)',builtin:'var(--orange)',
  custom:'var(--pink)',string:'var(--teal)'
};

SECTIONS.forEach(sec => {
  const allKws = sec.categories.flatMap(c=>c.keywords);
  totalKw += allKws.length;

  // Sidebar nav section
  const navSec = document.createElement('div');
  navSec.className='nav-section';
  const navHdr = document.createElement('div');
  navHdr.className='nav-section-header';
  navHdr.innerHTML=`<span class="nav-section-dot" style="background:${libColor[sec.lib]}"></span>${sec.title}<svg class="chevron" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
  const navKws = document.createElement('div');
  navKws.className='nav-keywords';
  navKws.style.maxHeight='1000px';
  allKws.forEach(kw=>{
    const a=document.createElement('a');
    a.className='nav-keyword';a.href='#kw-'+slug(kw.name);
    a.textContent=kw.name;a.dataset.lib=sec.lib;
    navKws.appendChild(a);
  });
  navHdr.addEventListener('click',()=>{
    const c=navHdr.classList.toggle('collapsed');
    navKws.style.maxHeight=c?'0':'1000px';
  });
  navSec.appendChild(navHdr);navSec.appendChild(navKws);
  nav.appendChild(navSec);

  // Section block
  const block=document.createElement('div');
  block.className='section-block';block.id='section-'+sec.lib;block.dataset.lib=sec.lib;
  block.innerHTML=`
    <div class="section-header" data-lib="${sec.lib}">
      <div class="section-icon" data-lib="${sec.lib}">${sec.icon}</div>
      <div class="section-meta"><h2>${sec.num}. ${sec.title}</h2><p>${esc(sec.import)}</p></div>
      <span class="section-badge" data-lib="${sec.lib}">${allKws.length} keywords</span>
    </div>`;
  sec.categories.forEach(cat=>{
    const lbl=document.createElement('div');lbl.className='category-label';
    lbl.innerHTML=`<span>${cat.label}</span>`;block.appendChild(lbl);
    cat.keywords.forEach(kw=>block.appendChild(buildCard(kw,sec.lib)));
  });
  content.appendChild(block);
});

    <div class="method-row"><span class="method-pill m-get">GET</span><div class="method-codes"><span class="status-badge s-2xx">200 OK</span><span class="status-badge s-3xx">301 Redirect</span><span class="status-badge s-3xx">302 Redirect</span><span class="status-badge s-4xx">401 Auth</span><span class="status-badge s-4xx">403 Forbidden</span></div></div>
    <div class="method-row"><span class="method-pill m-head">HEAD</span><div class="method-codes"><span class="status-badge s-2xx">200 OK</span><span class="status-badge s-3xx">301 Redirect</span><span class="status-badge s-4xx">401 Auth</span></div><span class="method-note">No body returned</span></div>
    <div class="method-row"><span class="method-pill m-post">POST</span><div class="method-codes"><span class="status-badge s-2xx">201 Created</span><span class="status-badge s-2xx">200 OK</span><span class="status-badge s-4xx">401 Auth</span><span class="status-badge s-4xx">403 Forbidden</span></div><span class="method-note">201 = correct REST creation code</span></div>
    <div class="method-row"><span class="method-pill m-put">PUT</span><div class="method-codes"><span class="status-badge s-2xx">200 OK</span><span class="status-badge s-2xx">204 No Content</span><span class="status-badge s-4xx">401 Auth</span><span class="status-badge s-4xx">403 Forbidden</span></div><span class="method-note">Full resource replace</span></div>
    <div class="method-row"><span class="method-pill m-patch">PATCH</span><div class="method-codes"><span class="status-badge s-2xx">200 OK</span><span class="status-badge s-2xx">204 No Content</span><span class="status-badge s-4xx">401 Auth</span><span class="status-badge s-4xx">403 Forbidden</span></div><span class="method-note">Partial field update</span></div>
    <div class="method-row"><span class="method-pill m-delete">DELETE</span><div class="method-codes"><span class="status-badge s-2xx">200 OK</span><span class="status-badge s-2xx">204 No Content</span><span class="status-badge s-4xx">401 Auth</span><span class="status-badge s-4xx">403 Forbidden</span><span class="status-badge s-4xx">404 Already Gone</span></div></div>
  </div>
  <div class="warning-box">
    <svg width="18" height="18" fill="none" stroke="var(--pink)" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <p><strong>Why NOT &lt; 500?</strong> Asserting <code>status_code &lt; 500</code> silently passes <strong>400 Bad Request</strong> and <strong>404 Not Found</strong>, which are real bugs. Always use the named Assert keywords with an explicit accepted-code list per HTTP method.</p>
  </div>
</div>`;
content.appendChild(statusSec);

document.getElementById('kw-count').textContent=totalKw;

// ── Card builder ──────────────────────────────────────────────────────────────
function buildCard(kw,lib){
  const id='kw-'+slug(kw.name);
  const card=document.createElement('div');
  card.className='keyword-card';card.id=id;card.dataset.lib=lib;card.dataset.name=kw.name.toLowerCase();

  let statusHTML='';
  if(kw.statuses){statusHTML='<div class="status-row">'+kw.statuses.map((s,i)=>`<span class="status-badge ${kw.statusTypes?.[i]||'s-2xx'}">${esc(s)}</span>`).join('')+'</div>';}

  const usageLines=kw.usage.map(u=>`<span class="code-line">${esc(u)}</span>`).join('');

  card.innerHTML=`
    <div class="kw-header" onclick="toggle(this)">
      <span class="kw-badge" data-lib="${lib}">${lib}</span>
      <span class="kw-name">${esc(kw.name)}</span>
      <span class="kw-purpose-preview">${esc(kw.purpose)}</span>
      <div class="kw-toggle"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div class="kw-body" id="b-${id}">
      <div class="kw-grid">
        <div class="kw-field">
          <div class="kw-field-label label-purpose">Purpose</div>
          <div class="kw-field-value">${esc(kw.purpose)}${statusHTML?'<br><br>'+statusHTML:''}</div>
        </div>
        <div class="kw-field">
          <div class="kw-field-label label-syntax">Syntax</div>
          <div class="kw-field-value"><code>${esc(kw.syntax)}</code></div>
        </div>
        <div class="kw-field full">
          <div class="kw-field-label label-usage">Usage Examples</div>
          <div style="position:relative"><div class="code-block">${usageLines}<button class="copy-btn" onclick="copyCode(this)">copy</button></div></div>
        </div>
        ${kw.notes?`<div class="kw-field${kw.source?'':' full'}"><div class="kw-field-label label-notes">Notes</div><div class="kw-field-value notes-text">${esc(kw.notes)}</div></div>`:''}
        ${kw.source?`<div class="kw-field${kw.notes?'':' full'}"><div class="kw-field-label label-source">Source File</div><div class="kw-field-value"><code>${esc(kw.source)}</code></div></div>`:''}
      </div>
    </div>`;
  return card;
}

function toggle(hdr){
  hdr.classList.toggle('open');
  hdr.nextElementSibling.classList.toggle('open');
}
function copyCode(btn){
  const txt=btn.parentElement.querySelector('.code-block').innerText.replace('copy','').trim();
  navigator.clipboard.writeText(txt).then(()=>{btn.textContent='copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='copy';btn.classList.remove('copied')},1800);});
}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── Filter chips ──────────────────────────────────────────────────────────────
document.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    filterLib(chip.dataset.lib);
  });
});
function filterLib(lib){
  document.querySelectorAll('.section-block').forEach(s=>{s.style.display=(lib==='all'||s.dataset.lib===lib)?'':'none'});
  document.getElementById('section-status').style.display=(lib==='all'||lib==='custom')?'':'none';
  document.querySelectorAll('.nav-keyword').forEach(a=>{a.style.display=(lib==='all'||a.dataset.lib===lib)?'':'none'});
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  let any=false;
  document.querySelectorAll('.keyword-card').forEach(c=>{
    const m=!q||c.dataset.name.includes(q)||c.querySelector('.kw-purpose-preview').textContent.toLowerCase().includes(q);
    c.classList.toggle('hidden',!m);if(m)any=true;
  });
  document.querySelectorAll('.section-block').forEach(s=>{
    s.style.display=[...s.querySelectorAll('.keyword-card')].some(c=>!c.classList.contains('hidden'))?'':'none';
  });
  document.getElementById('no-results').style.display=(!any&&q)?'block':'none';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  document.querySelector('.chip[data-lib="all"]').classList.add('active');
});

// ── Active nav link on scroll ─────────────────────────────────────────────────
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) document.querySelectorAll('.nav-keyword').forEach(a=>{
      a.classList.toggle('active',a.getAttribute('href')==='#'+e.target.id);
    });
  });
},{rootMargin:'-15% 0px -70% 0px'});
document.querySelectorAll('.keyword-card').forEach(c=>obs.observe(c));
</script>
