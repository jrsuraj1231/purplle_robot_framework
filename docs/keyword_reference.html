<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Keyword Reference — Purplle Robot Framework Suite</title>
<style>
  :root {
    --bg:        #0d0a14;
    --surface:   #15101f;
    --surface2:  #1e1630;
    --border:    #2d2248;
    --purple:    #9b5de5;
    --pink:      #f72585;
    --blue:      #4361ee;
    --green:     #06d6a0;
    --cyan:      #00b4d8;
    --orange:    #fb8500;
    --text:      #e8e0f5;
    --muted:     #8b7aa8;
    --code-bg:   #0a0714;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden}

  /* ── Sidebar ── */
  #sidebar{
    position:fixed;top:0;left:0;width:260px;height:100vh;
    background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;z-index:100;overflow:hidden;
    transition:transform .3s;
  }
  #sidebar-header{
    padding:24px 20px 16px;
    background:linear-gradient(135deg,#1a0a2e,#0d0a14);
    border-bottom:1px solid var(--border);flex-shrink:0;
  }
  #sidebar-header h2{font-size:13px;color:var(--purple);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
  #sidebar-header p{font-size:11px;color:var(--muted)}
  #search-box{
    margin:14px 16px 10px;
    display:flex;align-items:center;gap:8px;
    background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;
    flex-shrink:0;
  }
  #search-box svg{flex-shrink:0;opacity:.5}
  #search-input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%}
  #search-input::placeholder{color:var(--muted)}
  #nav{overflow-y:auto;flex:1;padding:8px 0 24px}
  #nav::-webkit-scrollbar{width:4px}
  #nav::-webkit-scrollbar-track{background:transparent}
  #nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .nav-section{margin-bottom:4px}
  .nav-section-header{
    display:flex;align-items:center;gap:10px;
    padding:10px 20px;cursor:pointer;
    font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);transition:color .2s;user-select:none;
  }
  .nav-section-header:hover{color:var(--text)}
  .nav-section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .nav-section-header .chevron{margin-left:auto;transition:transform .25s}
  .nav-section-header.collapsed .chevron{transform:rotate(-90deg)}
  .nav-keywords{overflow:hidden;transition:max-height .3s ease}
  .nav-keyword{
    display:block;padding:7px 20px 7px 38px;
    font-size:12.5px;color:var(--muted);text-decoration:none;
    border-left:2px solid transparent;transition:all .15s;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .nav-keyword:hover{color:var(--text);background:var(--surface2)}
  .nav-keyword.active{color:var(--text);border-left-color:var(--purple);background:rgba(155,93,229,.08)}
  .stats-bar{
    flex-shrink:0;padding:14px 20px;
    border-top:1px solid var(--border);background:var(--surface);
    display:flex;gap:12px;flex-wrap:wrap;
  }
  .stat{text-align:center;flex:1}
  .stat-num{font-size:16px;font-weight:700;color:var(--purple)}
  .stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  /* ── Main ── */
  #main{margin-left:260px;flex:1;min-height:100vh}
  #topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(13,10,20,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:0 32px;height:56px;
    display:flex;align-items:center;gap:16px;
  }
  #topbar h1{font-size:15px;font-weight:700;background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .filter-chips{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
  .chip{
    padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;
    border:1px solid transparent;cursor:pointer;transition:all .2s;
    text-transform:uppercase;letter-spacing:.5px;
  }
  .chip:hover{opacity:.85}
  .chip.active{color:#fff}
  .chip[data-lib="all"]{border-color:var(--purple);color:var(--purple)}
  .chip[data-lib="all"].active{background:var(--purple);color:#fff;border-color:var(--purple)}
  .chip[data-lib="selenium"]{border-color:var(--blue);color:var(--blue)}
  .chip[data-lib="selenium"].active{background:var(--blue);color:#fff}
  .chip[data-lib="requests"]{border-color:var(--green);color:var(--green)}
  .chip[data-lib="requests"].active{background:var(--green);color:#000}
  .chip[data-lib="collections"]{border-color:var(--cyan);color:var(--cyan)}
  .chip[data-lib="collections"].active{background:var(--cyan);color:#000}
  .chip[data-lib="builtin"]{border-color:var(--orange);color:var(--orange)}
  .chip[data-lib="builtin"].active{background:var(--orange);color:#000}
  .chip[data-lib="custom"]{border-color:var(--pink);color:var(--pink)}
  .chip[data-lib="custom"].active{background:var(--pink);color:#fff}

  #content{padding:32px}
  #no-results{display:none;text-align:center;padding:80px 32px;color:var(--muted)}
  #no-results svg{margin-bottom:16px;opacity:.3}
  #no-results p{font-size:16px}

  /* ── Section Header ── */
  .section-block{margin-bottom:48px}
  .section-header{
    display:flex;align-items:center;gap:16px;
    padding:20px 28px;border-radius:14px;margin-bottom:24px;
    position:relative;overflow:hidden;
  }
  .section-header::before{content:'';position:absolute;inset:0;opacity:.08}
  .section-header[data-lib="selenium"]{background:rgba(67,97,238,.15);border:1px solid rgba(67,97,238,.3)}
  .section-header[data-lib="selenium"]::before{background:var(--blue)}
  .section-header[data-lib="requests"]{background:rgba(6,214,160,.12);border:1px solid rgba(6,214,160,.25)}
  .section-header[data-lib="requests"]::before{background:var(--green)}
  .section-header[data-lib="collections"]{background:rgba(0,180,216,.12);border:1px solid rgba(0,180,216,.25)}
  .section-header[data-lib="collections"]::before{background:var(--cyan)}
  .section-header[data-lib="builtin"]{background:rgba(251,133,0,.12);border:1px solid rgba(251,133,0,.25)}
  .section-header[data-lib="builtin"]::before{background:var(--orange)}
  .section-header[data-lib="custom"]{background:rgba(247,37,133,.12);border:1px solid rgba(247,37,133,.25)}
  .section-header[data-lib="custom"]::before{background:var(--pink)}
  .section-icon{
    width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:700;flex-shrink:0;
  }
  .section-icon[data-lib="selenium"]{background:rgba(67,97,238,.25);color:var(--blue)}
  .section-icon[data-lib="requests"]{background:rgba(6,214,160,.2);color:var(--green)}
  .section-icon[data-lib="collections"]{background:rgba(0,180,216,.2);color:var(--cyan)}
  .section-icon[data-lib="builtin"]{background:rgba(251,133,0,.2);color:var(--orange)}
  .section-icon[data-lib="custom"]{background:rgba(247,37,133,.2);color:var(--pink)}
  .section-meta h2{font-size:20px;font-weight:700;margin-bottom:4px}
  .section-meta p{font-size:13px;color:var(--muted);font-family:monospace}
  .section-badge{
    margin-left:auto;padding:4px 14px;border-radius:20px;
    font-size:11px;font-weight:700;letter-spacing:.5px;
  }
  .section-badge[data-lib="selenium"]{background:rgba(67,97,238,.2);color:var(--blue)}
  .section-badge[data-lib="requests"]{background:rgba(6,214,160,.2);color:var(--green)}
  .section-badge[data-lib="collections"]{background:rgba(0,180,216,.2);color:var(--cyan)}
  .section-badge[data-lib="builtin"]{background:rgba(251,133,0,.2);color:var(--orange)}
  .section-badge[data-lib="custom"]{background:rgba(247,37,133,.2);color:var(--pink)}

  /* ── Category Label ── */
  .category-label{
    display:flex;align-items:center;gap:10px;
    margin:24px 0 14px;padding-left:4px;
  }
  .category-label span{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .category-label::after{content:'';flex:1;height:1px;background:var(--border)}

  /* ── Keyword Card ── */
  .keyword-card{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    margin-bottom:14px;overflow:hidden;transition:border-color .2s,transform .15s;
    animation:fadeup .3s ease both;
  }
  @keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .keyword-card:hover{border-color:var(--purple);transform:translateY(-1px)}
  .keyword-card[data-lib="selenium"]:hover{border-color:var(--blue)}
  .keyword-card[data-lib="requests"]:hover{border-color:var(--green)}
  .keyword-card[data-lib="collections"]:hover{border-color:var(--cyan)}
  .keyword-card[data-lib="builtin"]:hover{border-color:var(--orange)}
  .keyword-card[data-lib="custom"]:hover{border-color:var(--pink)}
  .keyword-card.hidden{display:none}
  .kw-header{
    display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;
    user-select:none;
  }
  .kw-badge{
    padding:3px 11px;border-radius:20px;font-size:10px;font-weight:700;
    letter-spacing:.5px;text-transform:uppercase;flex-shrink:0;
  }
  .kw-badge[data-lib="selenium"]{background:rgba(67,97,238,.2);color:var(--blue)}
  .kw-badge[data-lib="requests"]{background:rgba(6,214,160,.18);color:var(--green)}
  .kw-badge[data-lib="collections"]{background:rgba(0,180,216,.18);color:var(--cyan)}
  .kw-badge[data-lib="builtin"]{background:rgba(251,133,0,.18);color:var(--orange)}
  .kw-badge[data-lib="custom"]{background:rgba(247,37,133,.18);color:var(--pink)}
  .kw-name{font-size:14px;font-weight:700;font-family:'Courier New',monospace;flex:1}
  .kw-purpose-preview{font-size:12px;color:var(--muted);flex:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .kw-toggle{
    width:28px;height:28px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    background:var(--surface2);border:1px solid var(--border);flex-shrink:0;
    transition:transform .25s,background .2s;
  }
  .kw-header.open .kw-toggle{transform:rotate(180deg);background:var(--purple)}
  .kw-body{display:none;border-top:1px solid var(--border)}
  .kw-body.open{display:block}
  .kw-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .kw-field{padding:16px 20px;border-bottom:1px solid var(--border)}
  .kw-field:nth-child(odd){border-right:1px solid var(--border)}
  .kw-field.full{grid-column:1/-1}
  .kw-field-label{
    font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    margin-bottom:8px;
  }
  .label-purpose{color:var(--green)}
  .label-syntax{color:var(--cyan)}
  .label-notes{color:var(--orange)}
  .label-usage{color:var(--purple)}
  .kw-field-value{font-size:13px;line-height:1.6;color:var(--text)}
  .kw-field-value code,.code-block{
    font-family:'Courier New',monospace;font-size:12px;
    background:var(--code-bg);border:1px solid var(--border);
    border-radius:6px;padding:2px 7px;color:var(--cyan);
  }
  .code-block{
    display:block;padding:12px 16px;margin:4px 0;
    white-space:pre;overflow-x:auto;line-height:1.7;color:var(--text);
    position:relative;
  }
  .code-line{display:block}
  .code-kw{color:var(--purple)}
  .code-param{color:var(--cyan)}
  .code-comment{color:var(--muted);font-style:italic}
  .copy-btn{
    position:absolute;top:8px;right:8px;
    padding:3px 10px;border-radius:5px;border:1px solid var(--border);
    background:var(--surface2);color:var(--muted);font-size:10px;
    cursor:pointer;transition:all .2s;
  }
  .copy-btn:hover{color:var(--text);border-color:var(--purple)}
  .copy-btn.copied{color:var(--green);border-color:var(--green)}
  .notes-text{font-size:12.5px;color:var(--muted);line-height:1.6;font-style:italic}
  .status-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .status-badge{
    padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;
    font-family:monospace;
  }
  .s-2xx{background:rgba(6,214,160,.15);color:var(--green)}
  .s-3xx{background:rgba(0,180,216,.15);color:var(--cyan)}
  .s-4xx{background:rgba(251,133,0,.15);color:var(--orange)}
  .s-5xx{background:rgba(247,37,133,.15);color:var(--pink)}

  /* ── HTTP Status Table ── */
  .status-table-section{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:28px;margin-bottom:48px;
  }
  .status-table-section h3{
    font-size:16px;font-weight:700;margin-bottom:6px;
    background:linear-gradient(90deg,var(--purple),var(--pink));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .status-table-section p{font-size:13px;color:var(--muted);margin-bottom:20px}
  .method-rows{display:flex;flex-direction:column;gap:12px}
  .method-row{display:flex;align-items:center;gap:16px;padding:14px 18px;border-radius:10px;background:var(--surface2)}
  .method-pill{
    padding:5px 16px;border-radius:8px;font-size:12px;font-weight:700;
    font-family:monospace;min-width:70px;text-align:center;
  }
  .m-get{background:rgba(6,214,160,.2);color:var(--green)}
  .m-post{background:rgba(155,93,229,.2);color:var(--purple)}
  .m-put{background:rgba(0,180,216,.2);color:var(--cyan)}
  .m-patch{background:rgba(251,133,0,.2);color:var(--orange)}
  .m-delete{background:rgba(247,37,133,.2);color:var(--pink)}
  .method-codes{display:flex;gap:6px;flex:1;flex-wrap:wrap}
  .method-note{font-size:11px;color:var(--muted);margin-left:auto}
  .warning-box{
    background:rgba(247,37,133,.08);border:1px solid rgba(247,37,133,.25);
    border-radius:10px;padding:14px 18px;margin-top:16px;
    display:flex;align-items:flex-start;gap:12px;
  }
  .warning-box svg{flex-shrink:0;margin-top:1px}
  .warning-box p{font-size:12.5px;color:var(--text);line-height:1.6}
  .warning-box strong{color:var(--pink)}

  /* ── Mobile ── */
  #ham{display:none;position:fixed;top:16px;left:16px;z-index:200;
    background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    padding:8px;cursor:pointer;color:var(--text)}
  @media(max-width:768px){
    #sidebar{transform:translateX(-100%)}
    #sidebar.open{transform:translateX(0)}
    #main{margin-left:0}
    #ham{display:flex}
    .kw-grid{grid-template-columns:1fr}
    .kw-field:nth-child(odd){border-right:none}
    .filter-chips{display:none}
  }
</style>
</head>
<body>

<!-- Hamburger -->
<button id="ham" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Menu">
  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="0" y1="4" x2="18" y2="4"/><line x1="0" y1="9" x2="18" y2="9"/><line x1="0" y1="14" x2="18" y2="14"/></svg>
</button>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h2>Keyword Reference</h2>
    <p>Purplle.com Robot Framework Suite</p>
  </div>
  <div id="search-box">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="text" placeholder="Search keywords…" autocomplete="off" />
  </div>
  <nav id="nav"></nav>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num">5</div><div class="stat-lbl">Sections</div></div>
    <div class="stat"><div class="stat-num" id="kw-count">50+</div><div class="stat-lbl">Keywords</div></div>
    <div class="stat"><div class="stat-num">5</div><div class="stat-lbl">Libraries</div></div>
  </div>
</aside>

<!-- Main -->
<main id="main">
  <div id="topbar">
    <h1>Purplle RF Keyword Reference</h1>
    <div class="filter-chips">
      <button class="chip active" data-lib="all">All</button>
      <button class="chip" data-lib="selenium">Selenium</button>
      <button class="chip" data-lib="requests">Requests</button>
      <button class="chip" data-lib="collections">Collections</button>
      <button class="chip" data-lib="builtin">BuiltIn</button>
      <button class="chip" data-lib="custom">Custom</button>
    </div>
  </div>

  <div id="content">
    <div id="no-results">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>No keywords match your search.</p>
    </div>
    <!-- Sections are built by JS -->
  </div>
</main>

<script>
const SECTIONS = [
  {
    id:'selenium',lib:'selenium',num:1,
    title:'SeleniumLibrary',
    import:'Library    SeleniumLibrary',
    used:'resources/common_resources.robot, resources/pages/*.robot, tests/functional/*, tests/integration/*, tests/e2e/*',
    icon:'🌐',
    categories:[
      {label:'Browser Lifecycle',keywords:[
        {
          name:'Open Browser',
          purpose:'Launch a new browser window and navigate to a URL.',
          syntax:'Open Browser    <url>    <browser>',
          usage:[
            'Open Browser    https://www.purplle.com    chrome',
            'Open Browser    ${BASE_URL}    ${BROWSER}',
            'Open Browser    ${url}    ${BROWSER}',
            '...    options=add_argument("--headless=new");add_argument("--no-sandbox")',
          ],
          notes:'${BROWSER} defaults to chrome. Pass options= for headless/flags. Called inside custom keyword Open Application in common_resources.',
        },
        {
          name:'Maximize Browser Window',
          purpose:'Maximize the browser window to full screen.',
          syntax:'Maximize Browser Window',
          usage:['Maximize Browser Window'],
          notes:'Called right after Open Browser inside Open Application.',
        },
        {
          name:'Close All Browsers',
          purpose:'Close every open browser session managed by SeleniumLibrary.',
          syntax:'Close All Browsers',
          usage:['Close All Browsers'],
          notes:'Used inside custom keyword Close Application for Suite Teardown.',
        },
      ]},
      {label:'Navigation',keywords:[
        {
          name:'Go To',
          purpose:'Navigate the current browser to a given URL.',
          syntax:'Go To    <url>',
          usage:[
            'Go To    ${BASE_URL}',
            'Go To    ${BASE_URL}/search?q=${keyword}',
            'Go To    https://www.purplle.com/cart',
            'Go To    https://www.purplle.com/makeup',
            'Go To    https://www.purplle.com/profile/myfavourites',
            'Go To    ${MAKEUP_URL}',
            'Go To    ${SKINCARE_URL}',
            'Go To    ${HAIR_URL}',
          ],
          notes:'Used heavily in Test Setup and inside page keywords. Purplle is Angular — search requires direct URL navigation; pressing ENTER on the search bar does NOT trigger navigation.',
        },
        {
          name:'Location Should Be',
          purpose:'Assert the current URL matches exactly.',
          syntax:'Location Should Be    <expected_url>',
          usage:['Location Should Be    https://www.purplle.com/'],
          notes:'Use for exact URL match. Use Location Should Contain for partial.',
        },
        {
          name:'Location Should Contain',
          purpose:'Assert the current URL contains a substring.',
          syntax:'Location Should Contain    <substring>',
          usage:['Location Should Contain    myfavourites'],
          notes:'Preferred over Location Should Be when query strings may vary.',
        },
      ]},
      {label:'Waits',keywords:[
        {
          name:'Wait Until Element Is Visible',
          purpose:'Pause test execution until an element becomes visible on the page. Fails if the element is not visible within the timeout.',
          syntax:'Wait Until Element Is Visible    <locator>    timeout=<time>',
          usage:[
            'Wait Until Element Is Visible    ${LOGO}',
            'Wait Until Element Is Visible    ${FIRST_PRODUCT_CARD}    timeout=15s',
            'Wait Until Element Is Visible    ${EMPTY_CART_MESSAGE}    timeout=15s',
            'Wait Until Element Is Visible    ${MOBILE_INPUT}    timeout=10s',
            'Wait Until Element Is Visible    ${PRODUCT_NAME}    timeout=15s',
            'Wait Until Element Is Visible    ${WISHLIST_PAGE_HEADING}    timeout=15s',
            'Wait Until Element Is Visible    ${SEARCH_SUGGESTION_BOX}    timeout=5s',
            'Wait Until Element Is Visible    xpath=//h1    timeout=15s',
          ],
          notes:'ALWAYS use this instead of Sleep. Default timeout is ${TIMEOUT} (15s). Never use Sleep — it is fragile and wastes time.',
        },
      ]},
      {label:'Interaction',keywords:[
        {
          name:'Click Element',
          purpose:'Click on any DOM element identified by a locator.',
          syntax:'Click Element    <locator>',
          usage:[
            'Click Element    ${LOGO}',
            'Click Element    ${FIRST_PRODUCT_CARD}',
            'Click Element    ${ADD_TO_BAG_BTN}',
            'Click Element    ${SORT_DROPDOWN}',
            'Click Element    ${SORT_PRICE_LOW_HIGH}',
            'Click Element    ${NAV_MAKEUP}',
            'Click Element    ${WISHLIST_ICON}',
            'Click Element    ${CART_ICON}',
            'Click Element    ${REMOVE_BTN}',
            'Click Element    ${MOVE_TO_BAG_BTN}',

// ── Build UI ──────────────────────────────────────────────────────────────────
const content = document.getElementById('content');
const nav     = document.getElementById('nav');
let totalKw   = 0;

// Section color map
const libColor = {selenium:'var(--blue)',requests:'var(--green)',collections:'var(--cyan)',builtin:'var(--orange)',custom:'var(--pink)'};

SECTIONS.forEach(sec => {
  // Nav section
  const allKwsInSec = sec.categories.flatMap(c=>c.keywords);
  totalKw += allKwsInSec.length;

  const navSec = document.createElement('div');
  navSec.className = 'nav-section';
  const navHdr = document.createElement('div');
  navHdr.className = 'nav-section-header';
  navHdr.innerHTML = `<span class="nav-section-dot" style="background:${libColor[sec.lib]}"></span>${sec.title}<svg class="chevron" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
  const navKws = document.createElement('div');
  navKws.className = 'nav-keywords';
  navKws.style.maxHeight = '600px';
  allKwsInSec.forEach(kw => {
    const a = document.createElement('a');
    a.className = 'nav-keyword';
    a.href = '#kw-' + slugify(kw.name);
    a.textContent = kw.name;
    a.dataset.lib = sec.lib;
    navKws.appendChild(a);
  });
  navHdr.addEventListener('click', () => {
    const collapsed = navHdr.classList.toggle('collapsed');
    navKws.style.maxHeight = collapsed ? '0' : '600px';
  });
  navSec.appendChild(navHdr);
  navSec.appendChild(navKws);
  nav.appendChild(navSec);

  // Section block
  const block = document.createElement('div');
  block.className = 'section-block';
  block.id = 'section-' + sec.lib;
  block.dataset.lib = sec.lib;

  block.innerHTML = `
    <div class="section-header" data-lib="${sec.lib}">
      <div class="section-icon" data-lib="${sec.lib}">${sec.icon}</div>
      <div class="section-meta">
        <h2>${sec.num}. ${sec.title}</h2>
        <p>${sec.import}</p>
      </div>
      <span class="section-badge" data-lib="${sec.lib}">${allKwsInSec.length} keywords</span>
    </div>
  `;

  sec.categories.forEach(cat => {
    const catLabel = document.createElement('div');
    catLabel.className = 'category-label';
    catLabel.innerHTML = `<span>${cat.label}</span>`;
    block.appendChild(catLabel);

    cat.keywords.forEach(kw => {
      const card = buildCard(kw, sec.lib);
      block.appendChild(card);
    });
  });

  content.appendChild(block);
});

// ── Card builder ──────────────────────────────────────────────────────────────
function buildCard(kw, lib) {
  const id = 'kw-' + slugify(kw.name);
  const card = document.createElement('div');
  card.className = 'keyword-card';
  card.id = id;
  card.dataset.lib = lib;
  card.dataset.name = kw.name.toLowerCase();

  const headerHTML = `
    <div class="kw-header" onclick="toggleCard(this)">
      <span class="kw-badge" data-lib="${lib}">${lib}</span>
      <span class="kw-name">${escHtml(kw.name)}</span>
      <span class="kw-purpose-preview">${escHtml(kw.purpose)}</span>
      <div class="kw-toggle">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>`;

  let usageCode = kw.usage.map(u => `<span class="code-line">${escHtml(u)}</span>`).join('');

  let statusHTML = '';
  if (kw.statuses) {
    statusHTML = `<div class="status-row">${kw.statuses.map((s,i)=>`<span class="status-badge ${kw.statusTypes?.[i]||'s-2xx'}">${escHtml(s)}</span>`).join('')}</div>`;
  }

  let sourceHTML = '';
  if (kw.source) {
    sourceHTML = `<div class="kw-field full"><div class="kw-field-label label-notes">Source</div><div class="kw-field-value"><code>${escHtml(kw.source)}</code></div></div>`;
  }

  const bodyHTML = `
    <div class="kw-body" id="body-${id}">
      <div class="kw-grid">
        <div class="kw-field">
          <div class="kw-field-label label-purpose">Purpose</div>
          <div class="kw-field-value">${escHtml(kw.purpose)}${statusHTML ? '<br/><br/>'+statusHTML : ''}</div>
        </div>
        <div class="kw-field">
          <div class="kw-field-label label-syntax">Syntax</div>
          <div class="kw-field-value"><code>${escHtml(kw.syntax)}</code></div>
        </div>
        <div class="kw-field full">
          <div class="kw-field-label label-usage">Usage Examples</div>
          <div style="position:relative">
            <div class="code-block">${usageCode}<button class="copy-btn" onclick="copyCode(this)">copy</button></div>
          </div>
        </div>
        ${kw.notes ? `<div class="kw-field full"><div class="kw-field-label label-notes">Notes</div><div class="kw-field-value notes-text">${escHtml(kw.notes)}</div></div>` : ''}
        ${sourceHTML}
      </div>
    </div>`;

  card.innerHTML = headerHTML + bodyHTML;
  return card;
}

function toggleCard(hdr) {
  hdr.classList.toggle('open');
  const body = hdr.nextElementSibling;
  body.classList.toggle('open');
}

function copyCode(btn) {
  const block = btn.parentElement.querySelector('.code-block');
  const text = block.innerText.replace('copy','').trim();
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='copy';btn.classList.remove('copied')},1800);
  });
}

function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── Filter chips ──────────────────────────────────────────────────────────────
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    filterByLib(chip.dataset.lib);
  });
});

function filterByLib(lib) {
  const sections = document.querySelectorAll('.section-block');
  const status   = document.getElementById('section-status');
  sections.forEach(sec => {
    const match = lib==='all' || sec.dataset.lib===lib;
    sec.style.display = match ? '' : 'none';
  });
  status.style.display = (lib==='all'||lib==='custom') ? '' : 'none';
  document.querySelectorAll('.nav-keyword').forEach(a=>{
    a.style.display = lib==='all'||a.dataset.lib===lib ? '' : 'none';
  });
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  let anyVisible = false;
  document.querySelectorAll('.keyword-card').forEach(card => {
    const match = !q || card.dataset.name.includes(q) || card.querySelector('.kw-purpose-preview').textContent.toLowerCase().includes(q);
    card.classList.toggle('hidden', !match);
    if (match) anyVisible = true;
  });
  // Show/hide section headers based on visible cards
  document.querySelectorAll('.section-block').forEach(sec=>{
    const hasVisible = [...sec.querySelectorAll('.keyword-card')].some(c=>!c.classList.contains('hidden'));
    sec.style.display = hasVisible ? '' : 'none';
  });
  document.getElementById('no-results').style.display = !anyVisible&&q ? 'block' : 'none';
  // Reset chip filter
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  document.querySelector('.chip[data-lib="all"]').classList.add('active');
});

// ── IntersectionObserver for active nav link ──────────────────────────────────
const kwCards = document.querySelectorAll('.keyword-card');
const navLinks = document.querySelectorAll('.nav-keyword');
const obs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      navLinks.forEach(a=>{
        a.classList.toggle('active',a.getAttribute('href')==='#'+e.target.id);
      });
    }
  });
},{rootMargin:'-20% 0px -70% 0px'});
kwCards.forEach(c=>obs.observe(c));
</script>
