<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>UI Test Cases — Purplle Robot Framework</title>
<style>
:root{--bg:#0d0a14;--surface:#15101f;--surface2:#1e1630;--border:#2d2248;--purple:#9b5de5;--pink:#f72585;--blue:#4361ee;--green:#06d6a0;--cyan:#00b4d8;--orange:#fb8500;--teal:#4cc9f0;--text:#e8e0f5;--muted:#8b7aa8;--code-bg:#0a0714}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
#sidebar{position:fixed;top:0;left:0;width:270px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
#sidebar-header{padding:20px 18px 14px;background:linear-gradient(135deg,#1a0a2e,#0d0a14);border-bottom:1px solid var(--border);flex-shrink:0}
#sidebar-header h2{font-size:11.5px;color:var(--purple);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
#sidebar-header p{font-size:10.5px;color:var(--muted)}
#search-box{margin:10px 14px 8px;display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 11px;flex-shrink:0}
#search-box svg{flex-shrink:0;opacity:.5}
#search-input{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:100%}
#search-input::placeholder{color:var(--muted)}
#nav{overflow-y:auto;flex:1;padding:6px 0 16px}
#nav::-webkit-scrollbar{width:3px}
#nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.nav-group{margin-bottom:2px}
.nav-group-header{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);user-select:none;transition:color .2s}
.nav-group-header:hover{color:var(--text)}
.nav-group-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nav-group-header .chev{margin-left:auto;transition:transform .25s}
.nav-group-header.collapsed .chev{transform:rotate(-90deg)}
.nav-items{overflow:hidden;transition:max-height .3s}
.nav-item{display:block;padding:5px 16px 5px 32px;font-size:11.5px;color:var(--muted);text-decoration:none;border-left:2px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--text);border-left-color:var(--purple);background:rgba(155,93,229,.08)}
.stats-bar{flex-shrink:0;padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.stat{text-align:center;flex:1}
.stat-num{font-size:14px;font-weight:700;color:var(--purple)}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
#main{margin-left:270px;flex:1}
#topbar{position:sticky;top:0;z-index:50;background:rgba(13,10,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 26px;height:52px;display:flex;align-items:center;gap:12px}
#topbar h1{font-size:13.5px;font-weight:700;background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.filter-chips{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.chip{padding:3px 11px;border-radius:20px;font-size:9.5px;font-weight:700;border:1px solid transparent;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.chip[data-f="all"]{border-color:var(--purple);color:var(--purple)}.chip[data-f="all"].active{background:var(--purple);color:#fff}
.chip[data-f="smoke"]{border-color:var(--green);color:var(--green)}.chip[data-f="smoke"].active{background:var(--green);color:#000}
.chip[data-f="regression"]{border-color:var(--blue);color:var(--blue)}.chip[data-f="regression"].active{background:var(--blue);color:#fff}
.chip[data-f="negative"]{border-color:var(--pink);color:var(--pink)}.chip[data-f="negative"].active{background:var(--pink);color:#fff}
.chip[data-f="functional"]{border-color:var(--cyan);color:var(--cyan)}.chip[data-f="functional"].active{background:var(--cyan);color:#000}
.chip[data-f="integration"]{border-color:var(--orange);color:var(--orange)}.chip[data-f="integration"].active{background:var(--orange);color:#000}
.chip[data-f="e2e"]{border-color:var(--teal);color:var(--teal)}.chip[data-f="e2e"].active{background:var(--teal);color:#000}
#content{padding:24px}
.layer-block{margin-bottom:40px}
.layer-header{display:flex;align-items:center;gap:14px;padding:16px 22px;border-radius:12px;margin-bottom:18px}
.layer-header[data-layer="functional"]{background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.25)}
.layer-header[data-layer="integration"]{background:rgba(251,133,0,.1);border:1px solid rgba(251,133,0,.25)}
.layer-header[data-layer="e2e"]{background:rgba(76,201,240,.1);border:1px solid rgba(76,201,240,.25)}
.layer-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.layer-icon[data-layer="functional"]{background:rgba(0,180,216,.2);color:var(--cyan)}
.layer-icon[data-layer="integration"]{background:rgba(251,133,0,.2);color:var(--orange)}
.layer-icon[data-layer="e2e"]{background:rgba(76,201,240,.2);color:var(--teal)}
.layer-meta h2{font-size:17px;font-weight:700;margin-bottom:3px}
.layer-meta p{font-size:11.5px;color:var(--muted)}
.layer-count{margin-left:auto;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.layer-count[data-layer="functional"]{background:rgba(0,180,216,.2);color:var(--cyan)}
.layer-count[data-layer="integration"]{background:rgba(251,133,0,.2);color:var(--orange)}
.layer-count[data-layer="e2e"]{background:rgba(76,201,240,.2);color:var(--teal)}
.module-label{display:flex;align-items:center;gap:8px;margin:18px 0 10px;padding-left:2px}
.module-label span{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.module-label::after{content:'';flex:1;height:1px;background:var(--border)}
.tc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .2s;animation:fadeup .3s ease both}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tc-card:hover{border-color:rgba(155,93,229,.4)}
.tc-card.hidden{display:none}
.tc-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.tc-id{font-family:'Courier New',monospace;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:5px;background:rgba(155,93,229,.15);color:var(--purple);flex-shrink:0}
.tc-title{font-size:13px;font-weight:600;flex:1}
.tc-tags{display:flex;gap:5px;flex-shrink:0}
.tag{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.tag-smoke{background:rgba(6,214,160,.15);color:var(--green)}
.tag-regression{background:rgba(67,97,238,.15);color:var(--blue)}
.tag-negative{background:rgba(247,37,133,.15);color:var(--pink)}
.tc-toggle{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);flex-shrink:0;transition:transform .25s,background .2s}
.tc-header.open .tc-toggle{transform:rotate(180deg);background:var(--purple)}
.tc-body{display:none;border-top:1px solid var(--border);padding:14px 16px}
.tc-body.open{display:block}
/* ── Test Scenario banner ── */
.tc-scenario{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-left:3px solid var(--purple);background:rgba(155,93,229,.07);border-radius:0 8px 8px 0;margin-bottom:12px}
.tc-scenario-left{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-start;gap:3px}
.tc-scenario-id{font-family:'Courier New',monospace;font-size:9.5px;font-weight:700;color:var(--purple);letter-spacing:.3px}
.tc-scenario-label{font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tc-scenario-divider{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;margin:0 2px}
.tc-scenario-text{font-size:12.5px;color:var(--text);line-height:1.5;font-style:italic}
/* ── rest of card ── */
.tc-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tc-section{padding:12px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)}
.tc-section.full{grid-column:1/-1}
.tc-section-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.label-steps{color:var(--purple)}
.label-expected{color:var(--green)}
.label-prereq{color:var(--orange)}
.steps-list{list-style:none;counter-reset:step}
.steps-list li{counter-increment:step;display:flex;gap:8px;padding:4px 0;font-size:12px;line-height:1.5;color:var(--text)}
.steps-list li::before{content:counter(step);width:18px;height:18px;border-radius:50%;background:rgba(155,93,229,.2);color:var(--purple);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.expected-text{font-size:12px;color:var(--text);line-height:1.5}
.expected-text .pass{color:var(--green);font-weight:600}
#no-results{display:none;text-align:center;padding:60px;color:var(--muted)}
</style>
</head>
<body>
<aside id="sidebar">
  <div id="sidebar-header">
    <h2>UI Test Cases</h2>
    <p>Purplle.com — Manual Test Reference</p>
  </div>
  <div id="search-box">
    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="text" placeholder="Search test cases…" autocomplete="off"/>
  </div>
  <nav id="nav"></nav>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="total-count">—</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-num">11</div><div class="stat-lbl">Modules</div></div>
    <div class="stat"><div class="stat-num">3</div><div class="stat-lbl">Layers</div></div>
  </div>
</aside>
<main id="main">
  <div id="topbar">
    <h1>Purplle UI Test Cases</h1>
    <div class="filter-chips">
      <button class="chip active" data-f="all">All</button>
      <button class="chip" data-f="smoke">Smoke</button>
      <button class="chip" data-f="regression">Regression</button>
      <button class="chip" data-f="negative">Negative</button>
      <button class="chip" data-f="functional">Functional</button>
      <button class="chip" data-f="integration">Integration</button>
      <button class="chip" data-f="e2e">E2E</button>
    </div>
  </div>
  <div id="content"><div id="no-results"><p>No test cases match your search.</p></div></div>
</main>
<script>
const LAYERS=[
{id:'functional',label:'Functional Tests',icon:'🧪',desc:'Single-feature/page tests in isolation',
 modules:[
  {id:'homepage',label:'Homepage',file:'tests/functional/test_homepage.robot',tests:[
    {id:'TC_FUNC_HOME_01',title:'Verify Homepage Title',tags:['smoke'],
     scenario:'Verify that the browser tab title contains "Purplle" when the user navigates to the homepage.',
     desc:'Verify the purplle.com homepage loads with the correct browser tab title.',
     prereq:'Browser open, no login required.',
     steps:['Navigate to https://www.purplle.com','Wait for the page to fully load','Read the browser tab title'],
     expected:'Browser tab title contains the text "Purplle"'},
    {id:'TC_FUNC_HOME_02',title:'Verify Search Bar Is Visible',tags:['smoke'],
     scenario:'Verify that the search input field is visible in the homepage header upon page load.',
     desc:'Verify the search input field is present in the page header.',
     steps:['Navigate to https://www.purplle.com','Look at the header/top area of the page'],
     expected:'Search input field is visible in the page header'},
    {id:'TC_FUNC_HOME_03',title:'Verify Login Register Link Is Visible',tags:['smoke'],
     scenario:'Verify that the Login/Register link is accessible from the homepage header for unauthenticated users.',
     desc:'Verify the Login/Register link is accessible from the header.',
     steps:['Navigate to https://www.purplle.com','Locate the top-right area of the header'],
     expected:'"Login / Register" link is visible and clickable in the header'},
    {id:'TC_FUNC_HOME_04',title:'Verify Cart Icon Is Visible',tags:['smoke'],
     scenario:'Verify that the shopping cart/bag icon is present and visible in the homepage header.',
     desc:'Verify the cart/bag icon is present in the header.',
     steps:['Navigate to https://www.purplle.com','Look at the top-right header area'],
     expected:'Shopping bag / cart icon is visible in the header'},
    {id:'TC_FUNC_HOME_05',title:'Verify Logo Is Displayed',tags:['smoke'],
     scenario:'Verify that the Purplle brand logo is displayed in the top-left area of the homepage.',
     desc:'Verify the Purplle logo is displayed in the header.',
     steps:['Navigate to https://www.purplle.com','Look at the top-left area of the page'],
     expected:'Purplle logo image is displayed prominently in the header'},
    {id:'TC_FUNC_HOME_06',title:'Verify All Header Elements Are Present',tags:['regression'],
     scenario:'Verify that all four header elements — logo, search bar, login link, and cart icon — are simultaneously visible on the homepage.',
     desc:'Verify logo, search bar, login link, and cart icon all exist together simultaneously.',
     steps:['Navigate to https://www.purplle.com','Inspect the full header row'],
     expected:'Logo, search input, Login/Register link, and cart icon are all visible at the same time'},
    {id:'TC_FUNC_HOME_07',title:'Verify Main Navigation Links Are Present',tags:['regression'],
     scenario:'Verify that all primary navigation links (Makeup, Skincare, Offers, Brands) are visible in the nav bar on the homepage.',
     desc:'Verify Makeup, Skincare, Offers, and Brands nav links are visible.',
     steps:['Navigate to https://www.purplle.com','Look at the main navigation bar below the header'],
     expected:'Makeup, Skincare, Offers, and Brands links are all visible in the nav bar'},
    {id:'TC_FUNC_HOME_08',title:'Verify Makeup Category Link Is Clickable',tags:['regression'],
     scenario:'Verify that clicking the Makeup navigation link from the homepage navigates the user to the Makeup category page.',
     desc:'Verify clicking the Makeup nav link navigates to the Makeup category page.',
     steps:['Navigate to https://www.purplle.com','Click "Makeup" in the navigation bar','Wait for page to load'],
     expected:'Category page loads and contains the heading/text "Makeup"'},
    {id:'TC_FUNC_HOME_09',title:'Verify Search Navigates To Results Page',tags:['regression'],
     scenario:'Verify that submitting a keyword in the homepage search bar navigates the user to a product results page.',
     desc:'Verify that searching for a keyword from the homepage shows product results.',
     steps:['Navigate to https://www.purplle.com','Click the search bar','Type "lipstick" and press Enter or click search icon','Wait for results to load'],
     expected:'Search results page displays product cards for lipstick'},
    {id:'TC_FUNC_HOME_10',title:'Verify Clicking Login Link Opens Login Page',tags:['regression'],
     scenario:'Verify that clicking the Login/Register header link redirects the user to the mobile OTP login page.',
     desc:'Verify clicking the Login/Register link redirects to the login page.',
     steps:['Navigate to https://www.purplle.com','Click "Login / Register" link in the header','Wait for page to load'],
     expected:'Login page opens and shows text "Login" with a mobile number input field visible'},
  ]},
  {id:'login',label:'Login',file:'tests/functional/test_login.robot',tests:[
    {id:'TC_FUNC_LOGIN_01',title:'Verify Login Page Loads Successfully',tags:['smoke'],
     scenario:'Verify that the login page loads successfully and the mobile number input is visible when the user navigates to /login.',
     desc:'Verify the purplle.com login page loads and the mobile input is shown.',
     steps:['Navigate to https://www.purplle.com/login','Wait for page to load'],
     expected:'Login page loads successfully; mobile number input field is visible'},
    {id:'TC_FUNC_LOGIN_02',title:'Verify Mobile Number Input Field Is Present',tags:['smoke'],
     scenario:'Verify that a mobile number input field exists on the login page for user authentication.',
     desc:'Verify the mobile number field is visible on the login page.',
     steps:['Navigate to https://www.purplle.com/login','Locate the mobile number input field'],
     expected:'Mobile number input field is visible on the page'},
    {id:'TC_FUNC_LOGIN_03',title:'Verify Get OTP Button Is Present',tags:['smoke'],
     scenario:'Verify that the "Get OTP" button is visible on the login page so users can request a one-time password.',
     desc:'Verify the Get OTP button is visible on the login page.',
     steps:['Navigate to https://www.purplle.com/login','Locate the OTP request button'],
     expected:'"Get OTP" button is visible on the login page'},
    {id:'TC_FUNC_LOGIN_04',title:'Verify Signup Link Is Present',tags:['regression'],
     scenario:'Verify that a new user registration / sign-up link is visible on the login page for first-time users.',
     desc:'Verify the new user registration link is present on the login page.',
     steps:['Navigate to https://www.purplle.com/login','Look for signup/new account link'],
     expected:'A "Sign Up" or new user registration link is visible on the page'},
    {id:'TC_FUNC_LOGIN_05',title:'Enter Invalid Short Mobile Number And Verify Error',tags:['regression','negative'],
     scenario:'Verify that submitting a 5-digit mobile number triggers a validation error message on the login page.',
     desc:'Verify error message appears for an invalid mobile number (fewer than 10 digits).',
     steps:['Navigate to https://www.purplle.com/login','Enter "12345" (only 5 digits) in the mobile number field','Click the "Get OTP" button'],
     expected:'An error message is displayed indicating the mobile number is invalid'},
    {id:'TC_FUNC_LOGIN_06',title:'Submit Without Entering Mobile Number And Verify Error',tags:['regression','negative'],
     scenario:'Verify that submitting the OTP request with an empty mobile number field displays a validation error.',
     desc:'Verify error message appears when OTP is requested with an empty mobile field.',
     steps:['Navigate to https://www.purplle.com/login','Leave the mobile number field empty','Click the "Get OTP" button'],
     expected:'An error message appears prompting the user to enter a mobile number'},
    {id:'TC_FUNC_LOGIN_07',title:'Enter Alphabetic Characters And Verify Error',tags:['regression','negative'],
     scenario:'Verify that entering alphabetic characters in the mobile number field triggers a validation error.',
     desc:'Verify error message appears when alphabets are entered in mobile number field.',
     steps:['Navigate to https://www.purplle.com/login','Type "abcdefghij" (letters only) in the mobile number field','Click the "Get OTP" button'],
     expected:'An error message is displayed indicating invalid characters in the mobile number field'},
    {id:'TC_FUNC_LOGIN_08',title:'Verify Mobile Input Accepts 10 Digit Number',tags:['regression'],
     scenario:'Verify that a valid 10-digit mobile number is accepted and retained by the mobile number input field.',
     desc:'Verify a valid 10-digit mobile number can be entered in the field.',
     steps:['Navigate to https://www.purplle.com/login','Enter "9876543210" (valid 10-digit number) in the mobile field'],
     expected:'The input field accepts and retains the full 10-digit number "9876543210"'},
  ]},
  {id:'search',label:'Search',file:'tests/functional/test_search.robot',tests:[
    {id:'TC_FUNC_SEARCH_01',title:'Search For A Valid Product And Verify Results',tags:['smoke'],
     scenario:'Verify that searching for "lipstick" displays relevant product cards on the search results page.',
     desc:'Search for "lipstick" and verify product result cards are displayed.',
     steps:['Navigate to https://www.purplle.com/search?q=lipstick','Wait for results page to load'],
     expected:'Product cards for lipstick are displayed on the search results page'},
    {id:'TC_FUNC_SEARCH_02',title:'Search For A Brand Name And Verify Results',tags:['smoke'],
     scenario:'Verify that searching for brand name "Lakme" returns brand-specific product cards in search results.',
     desc:'Search for "Lakme" brand and verify brand products appear in results.',
     steps:['Navigate to https://www.purplle.com/search?q=Lakme','Wait for results page to load'],
     expected:'Product cards for Lakme brand are displayed in search results'},
    {id:'TC_FUNC_SEARCH_03',title:'Search For A Skincare Product',tags:['regression'],
     scenario:'Verify that searching for "moisturizer" returns skincare product cards on the results page.',
     desc:'Search for "moisturizer" and verify skincare products appear.',
     steps:['Navigate to https://www.purplle.com/search?q=moisturizer','Wait for results to load'],
     expected:'Skincare/moisturizer product cards are displayed'},
    {id:'TC_FUNC_SEARCH_04',title:'Search For A Haircare Product',tags:['regression'],
     scenario:'Verify that searching for "shampoo" returns haircare product cards on the results page.',
     desc:'Search for "shampoo" and verify haircare products appear.',
     steps:['Navigate to https://www.purplle.com/search?q=shampoo','Wait for results to load'],
     expected:'Haircare/shampoo product cards are displayed'},
    {id:'TC_FUNC_SEARCH_05',title:'Search For A Fragrance Product',tags:['regression'],
     scenario:'Verify that searching for "perfume" returns fragrance product cards on the results page.',
     desc:'Search for "perfume" and verify fragrance products appear.',
     steps:['Navigate to https://www.purplle.com/search?q=perfume','Wait for results to load'],
     expected:'Fragrance/perfume product cards are displayed'},
    {id:'TC_FUNC_SEARCH_06',title:'Verify No Results Message For Invalid Keyword',tags:['regression','negative'],
     scenario:'Verify that searching for a nonsense keyword shows a "no results found" message instead of product cards.',
     desc:'Search for a nonsense term and verify a "no results" message is shown.',
     steps:['Navigate to https://www.purplle.com/search?q=xyzabc123invalidproduct','Wait for page to load'],
     expected:'"No results found" or similar no-results message is displayed; no product cards visible'},
    {id:'TC_FUNC_SEARCH_07',title:'Verify Search Suggestions Appear While Typing',tags:['regression'],
     scenario:'Verify that autocomplete suggestion dropdown appears when the user types a partial keyword in the search bar.',
     desc:'Verify autocomplete suggestions appear when the user starts typing in the search bar.',
     steps:['Navigate to https://www.purplle.com','Click on the search input field in the header','Type "lipst" (partial keyword — do NOT press Enter)','Wait for suggestions to appear below the input'],
     expected:'Autocomplete suggestion dropdown appears with product/keyword suggestions'},
    {id:'TC_FUNC_SEARCH_08',title:'Click First Product From Search Results Opens PDP',tags:['regression'],
     scenario:'Verify that clicking a product card in the search results navigates the user to the correct product detail page.',
     desc:'Verify clicking a search result card navigates to the product detail page.',
     steps:['Navigate to https://www.purplle.com/search?q=lipstick','Wait for product cards to load','Click on the first product card in the results','Wait for the product detail page to load'],
     expected:'Product detail page (PDP) opens with product name heading (h1) visible'},
  ]},
  {id:'plp',label:'Product Listing',file:'tests/functional/test_product_listing.robot',tests:[
    {id:'TC_FUNC_PLP_01',title:'Verify Makeup Category Page Loads With Products',tags:['smoke'],
     scenario:'Verify that the Makeup category page loads with a category heading and visible product cards.',
     desc:'Navigate to Makeup category and verify products are listed.',
     steps:['Navigate to https://www.purplle.com/makeup','Wait for page to load'],

const content=document.getElementById('content');
const nav=document.getElementById('nav');
let total=0;
const layerColor={'functional':'var(--cyan)','integration':'var(--orange)','e2e':'var(--teal)'};

LAYERS.forEach(layer=>{
  const allTests=layer.modules.flatMap(m=>m.tests);
  total+=allTests.length;
  // Nav group
  const ng=document.createElement('div');ng.className='nav-group';
  const nh=document.createElement('div');nh.className='nav-group-header';
  nh.innerHTML=`<span class="nav-group-dot" style="background:${layerColor[layer.id]}"></span>${layer.label}<svg class="chev" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
  const ni=document.createElement('div');ni.className='nav-items';ni.style.maxHeight='1200px';
  layer.modules.forEach(m=>{
    const a=document.createElement('a');a.className='nav-item';a.href='#mod-'+m.id;
    a.dataset.layer=layer.id;a.textContent=m.label+' ('+m.tests.length+')';
    ni.appendChild(a);
  });
  nh.addEventListener('click',()=>{const c=nh.classList.toggle('collapsed');ni.style.maxHeight=c?'0':'1200px'});
  ng.appendChild(nh);ng.appendChild(ni);nav.appendChild(ng);
  // Layer block
  const lb=document.createElement('div');lb.className='layer-block';lb.id='layer-'+layer.id;lb.dataset.layer=layer.id;
  lb.innerHTML=`<div class="layer-header" data-layer="${layer.id}"><div class="layer-icon" data-layer="${layer.id}">${layer.icon}</div><div class="layer-meta"><h2>${layer.label}</h2><p>${layer.desc}</p></div><span class="layer-count" data-layer="${layer.id}">${allTests.length} test cases</span></div>`;
  layer.modules.forEach(m=>{
    const ml=document.createElement('div');ml.className='module-label';ml.id='mod-'+m.id;
    ml.innerHTML=`<span>${m.label} <span style="color:var(--border);font-weight:400">${m.file}</span></span>`;
    lb.appendChild(ml);
    m.tests.forEach((tc,i)=>{lb.appendChild(buildCard(tc,layer.id,i*30))});
  });
  content.appendChild(lb);
});
document.getElementById('total-count').textContent=total;

function buildCard(tc,layer,delay){
  const card=document.createElement('div');
  card.className='tc-card';card.id='tc-'+tc.id;card.dataset.layer=layer;card.dataset.title=tc.title.toLowerCase();
  card.dataset.id=tc.id.toLowerCase();card.dataset.tags=tc.tags.join(' ');
  card.style.animationDelay=delay+'ms';
  const tagHTML=tc.tags.filter(t=>['smoke','regression','negative'].includes(t)).map(t=>`<span class="tag tag-${t}">${t}</span>`).join('');
  card.innerHTML=`
    <div class="tc-header" onclick="tog(this)">
      <span class="tc-id">${esc(tc.id)}</span>
      <span class="tc-title">${esc(tc.title)}</span>
      <div class="tc-tags">${tagHTML}</div>
      <div class="tc-toggle"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div class="tc-body">
      <div class="tc-scenario">
        <div class="tc-scenario-left">
          <span class="tc-scenario-label">Scenario</span>
          <span class="tc-scenario-id">${esc(tc.id)}</span>
        </div>
        <div class="tc-scenario-divider"></div>
        <span class="tc-scenario-text">${esc(tc.scenario)}</span>
      </div>
      <p class="tc-desc">${esc(tc.desc)}</p>
      <div class="tc-grid">
        ${tc.prereq?`<div class="tc-section full"><div class="tc-section-label label-prereq">Pre-conditions</div><p class="expected-text">${esc(tc.prereq)}</p></div>`:''}
        <div class="tc-section"><div class="tc-section-label label-steps">Test Steps</div><ol class="steps-list">${tc.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol></div>
        <div class="tc-section"><div class="tc-section-label label-expected">Expected Result</div><p class="expected-text"><span class="pass">✓ </span>${esc(tc.expected)}</p></div>
      </div>
    </div>`;
  return card;
}

function tog(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Filter chips
document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');filter(c.dataset.f);
  });
});
function filter(f){
  document.querySelectorAll('.tc-card').forEach(c=>{
    const show=f==='all'||c.dataset.layer===f||c.dataset.tags.includes(f);
    c.classList.toggle('hidden',!show);
  });
  document.querySelectorAll('.layer-block').forEach(b=>{
    b.style.display=[...b.querySelectorAll('.tc-card')].some(c=>!c.classList.contains('hidden'))?'':'none';
  });
}

// Search
document.getElementById('search-input').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  let any=false;
  document.querySelectorAll('.tc-card').forEach(c=>{
    const m=!q||c.dataset.title.includes(q)||c.dataset.id.includes(q)||c.textContent.toLowerCase().includes(q);
    c.classList.toggle('hidden',!m);if(m)any=true;
  });
  document.querySelectorAll('.layer-block').forEach(b=>{
    b.style.display=[...b.querySelectorAll('.tc-card')].some(c=>!c.classList.contains('hidden'))?'':'none';
  });
  document.getElementById('no-results').style.display=(!any&&q)?'block':'none';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  document.querySelector('.chip[data-f="all"]').classList.add('active');
});

// Scroll spy
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{if(x.isIntersecting){const id=x.target.id.replace('mod-','');document.querySelectorAll('.nav-item').forEach(a=>{a.classList.toggle('active',a.getAttribute('href')==='#'+x.target.id)})}});
},{rootMargin:'-10% 0px -80% 0px'});
document.querySelectorAll('.module-label').forEach(m=>obs.observe(m));
</script>
